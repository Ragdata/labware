[symbols]
error = "✘"
warning = "🛆"
info = "✚"
success = "🗸"
tip = "★"
important = "⚑"
debug = "⚙"
head = "➤"
dot = "⦁"

[styles]
error = "bold red"
warning = "bold yellow"
info = "bright_blue"
success = "bright_green"
tip = "cyan"
important = "magenta"
debug = "dim white"
head = "bold yellow"
dot = "green"

[logging]
level = 20
size = 1 * 1024 * 1024
count = 3
format = "std"
logdir = ".labware/log"

[log_formats]
std = "%(asctime)s :: %(levelname)s :: %(message)s"
short = "%(levelname)s :: %(message)s"
long = "%(asctime)s :: %(levelname)s :: %(message)s in %(filename)s\n%(pathname)s [ %(funcName)s line %(lineno)s ]"
console = "%(message)s"
date = "%Y-%m-%d %H:%M:%S"

[dirs]
labware = .labware
pkg = %(labware)s/pkg
scr = %(labware)s/scr
sys = %(labware)s/sys
dot = %(sys)s/dots
lib = %(sys)s/lib
aliases = %(lib)s/aliases
assets = %(lib)s/assets
completions = %(lib)s/completions
functions = %(lib)s/functions
help = %(lib)s/help
plugins = %(lib)s/plugins
profiles = %(lib)s/profiles
scripts = %(lib)s/scripts
templates = %(lib)s/templates
