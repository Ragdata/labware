[symbols]
error = "✘"
warning = "🛆"
info = "✚"
success = "🗸"
tip = "★"
important = "⚑"
debug = "⚙"
head = "➤"
dot = "⦁"

[styles]
error = "bold red"
warning = "bold yellow"
info = "bright_blue"
success = "bright_green"
tip = "cyan"
important = "magenta"
debug = "dim white"
head = "bold yellow"
dot = "green"

[logging]
dir = "/var/log/labware"
level = 20
size = 1 * 1024 * 1024
count = 3
format = "std"

[log_formats]
std = "%(asctime)s :: %(levelname)s :: %(message)s"
short = "%(levelname)s :: %(message)s"
long = "%(asctime)s :: %(levelname)s :: %(message)s in %(filename)s\n%(pathname)s [ %(funcName)s line %(lineno)s ]"
console = "%(message)s"
date = "%Y-%m-%d %H:%M:%S"

[paths]
backup = ".labware/.backup"
registry = ".labware/registry"

